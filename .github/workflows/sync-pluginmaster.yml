name: Sync PluginMaster

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-single-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout minimal repo (only target file)
        uses: actions/checkout@v4.2.0
        with:
          ref: master
          fetch-depth: 1
          sparse-checkout: |
            DoubleWeaver/blob/PluginMaster.json  

      - name: Download and replace PluginMaster.json only
        run: |
          TARGET_FILE="DoubleWeaver/blob/PluginMaster.json"
          REMOTE_FILE="https://aonyx.ffxiv.wang/Plugin/PluginMaster"

          mkdir -p $(dirname "$TARGET_FILE")

          echo "🔄 Downloading remote file to $TARGET_FILE"
          curl -fsSL "$REMOTE_FILE" -o "$TARGET_FILE"

          if [ ! -s "$TARGET_FILE" ]; then
            echo "❌ Error: $TARGET_FILE is empty or not found"
            exit 1
          fi
          echo "✅ $TARGET_FILE downloaded successfully (raw JSON, no conversion)"

      - name: Commit only PluginMaster.json changes
        run: |
          TARGET_FILE="DoubleWeaver/blob/PluginMaster.json"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "$TARGET_FILE"

          if git diff --cached --quiet; then
            echo "ℹ️ No changes to $TARGET_FILE, skip commit"
            exit 0
          fi

          git commit -m "Auto Sync PluginMaster"

          git push origin master
          echo "✅ Only $TARGET_FILE synced! All other files are unchanged."
