name: Sync PluginMaster

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-single-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.0
        with:
          ref: master
          fetch-depth: 1

      - name: Sync original PluginMaster
        run: |
          TARGET_FILE="DoubleWeaver/blob/PluginMaster.json"
          REMOTE_FILE="https://aonyx.ffxiv.wang/Plugin/PluginMaster"

          mkdir -p $(dirname "$TARGET_FILE")
          curl -fsSL "$REMOTE_FILE" -o "$TARGET_FILE"

          if [ ! -s "$TARGET_FILE" ]; then
            echo "❌ $TARGET_FILE download failed"
            exit 1
          fi
          echo "✅ Synced PluginMaster.json"

      - name: Sync LightlessSync
        run: |
          TARGET_FILE="DoubleWeaver/blob/LightlessSync.json"
          REMOTE_FILE="https://dalamud_cn_3rd.otters.cloud/plugins/Lightless%20Sync"

          mkdir -p $(dirname "$TARGET_FILE")
          curl -fsSL "$REMOTE_FILE" -o "$TARGET_FILE"

          if [ ! -s "$TARGET_FILE" ]; then
            echo "❌ $TARGET_FILE download failed"
            exit 1
          fi
          echo "✅ Synced LightlessSync.json"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "DoubleWeaver/blob/PluginMaster.json"
          git add "DoubleWeaver/blob/LightlessSync.json"

          if git diff --cached --quiet; then
            echo "ℹ️ No changes, skip commit"
            exit 0
          fi

          git commit -m "Auto Sync - $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')"
          git push origin master

          echo "✅ All files synced successfully!"
