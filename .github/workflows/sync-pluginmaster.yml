name: Sync PluginMaster

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-file-api:
    runs-on: ubuntu-latest
    steps:
      - name: Get remote file content (raw)
        id: get_content
        run: |
          REMOTE_CONTENT=$(curl -sSL --fail "https://aonyx.ffxiv.wang/Plugin/PluginMaster")
          if [ -z "$REMOTE_CONTENT" ]; then
            echo "❌ Remote content is empty, exit"
            exit 1
          fi
          echo -n "$REMOTE_CONTENT" | base64 -w 0 > /tmp/base64_content.txt
          echo "base64_file=/tmp/base64_content.txt" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create/Update file via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: zhouhuichen741
          REPO: DoubleWeaver
          FILE_PATH: PluginMaster.json
          BRANCH: master
        run: |
          API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$FILE_PATH"
          
          FILE_SHA=$(curl -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            "$API_URL" \
            | jq -r '.sha // empty')

          PAYLOAD=$(jq -n \
            --arg message "Auto sync PluginMaster - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --arg sha "$FILE_SHA" \
            --arg branch "$BRANCH" \
            --slurpfile content ${{ steps.get_content.outputs.base64_file }} \
            '{
              message: $message,
              content: $content[0],
              sha: $sha,
              branch: $branch
            }')
          
          RESPONSE=$(curl -sSL -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_URL" \
            -d "$PAYLOAD")

          echo "API Response: $RESPONSE"
          if echo "$RESPONSE" | jq -e '.commit' > /dev/null; then
            echo "✅ File synced successfully via API!"
          else
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message // "Unknown error"')
            ERROR_DETAILS=$(echo "$RESPONSE" | jq -r '.errors // "No details"')
            echo "❌ Sync failed: $ERROR_MSG"
            echo "❌ Error details: $ERROR_DETAILS"
            exit 1
          fi
