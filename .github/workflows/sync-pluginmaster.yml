name: Sync PluginMaster

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync-via-api:
    runs-on: ubuntu-latest
    steps:
      - name: Get remote file content
        id: get_remote_content
        run: |
          REMOTE_CONTENT=$(curl -sSL "https://aonyx.ffxiv.wang/Plugin/PluginMaster")
          ESCAPED_CONTENT=$(echo "$REMOTE_CONTENT" | jq -R .)
          echo "content=$ESCAPED_CONTENT" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update file via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: zhouhuichen741
          REPO_NAME: DoubleWeaver
          FILE_PATH: DoubleWeaver/blob/PluginMaster.json
          COMMIT_MSG: "Auto sync PluginMaster (API) - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        run: |
          FILE_SHA=$(curl -sSL \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/$FILE_PATH" \
            | jq -r '.sha // empty')

          PAYLOAD=$(jq -n \
            --arg message "$COMMIT_MSG" \
            --arg content "$(echo ${{ steps.get_remote_content.outputs.content }} | jq -r .)" \
            --arg sha "$FILE_SHA" \
            '{
              message: $message,
              content: ($content | @base64),
              sha: $sha
            }')

          RESPONSE=$(curl -sSL -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/$FILE_PATH" \
            -d "$PAYLOAD")

          echo "API Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.commit' > /dev/null; then
            echo "✅ File synced successfully!"
          else
            echo "❌ Sync failed: $(echo "$RESPONSE" | jq -r '.message')"
            exit 1
          fi
