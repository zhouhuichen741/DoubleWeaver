name: Sync PluginMaster

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-single-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout only latest version (minimal clone)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          sparse-checkout: |
            PluginMaster.json

      - name: Download and replace ONLY PluginMaster.json
        run: |
          REMOTE_FILE="https://aonyx.ffxiv.wang/Plugin/PluginMaster"
          TARGET_FILE="PluginMaster.json"

          curl -fsSL "$REMOTE_FILE" -o "$TARGET_FILE"

          if [ ! -f "$TARGET_FILE" ]; then
            echo "❌ Only $TARGET_FILE download failed"
            exit 1
          fi
          echo "✅ Only $TARGET_FILE downloaded (other files untouched)"

      - name: Commit ONLY $TARGET_FILE changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "$TARGET_FILE"

          if git diff --cached --quiet; then
            echo "ℹ️ Only $TARGET_FILE has no changes, skip commit"
            exit 0
          fi

          git commit -m "Auto sync ONLY PluginMaster.json (no other files) - $(date -u)"
          
          git push origin master
          echo "✅ Only PluginMaster.json synced (all other files remain unchanged)!"
